# Catalog CI — what this does
#
# On every push and pull request to `main`, GitHub runs a fresh Ubuntu VM that:
#   1. Checks out your repo
#   2. Installs Python and `requirements.txt` (jsonschema, etc.)
#   3. Runs `python tools/build_catalog.py` (same as locally: CSV → data/entries/*.json + validate)
#   4. Runs `git diff --exit-code` so the job FAILS if anything changed
#
# So: if you edit `source/mmm_catalog.csv` but forget to commit the regenerated
# `data/entries/` JSON files, or the export is invalid, the check goes red until fixed.
# That is the whole point — no surprises on `main`.

name: Catalog CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Regenerate catalog and run JSON Schema validation
        run: python tools/build_catalog.py

      - name: Fail if generated files were not committed
        run: git diff --exit-code
